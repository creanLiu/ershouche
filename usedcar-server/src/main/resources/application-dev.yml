spring:
  datasource:
    url: jdbc:mysql://localhost:3307/usedcar?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6380
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# 微信小程序配置
wx:
  miniapp:
    app-id: ${WX_MINIAPP_APPID:your-app-id}
    app-secret: ${WX_MINIAPP_SECRET:your-app-secret}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:usedcar-dev-jwt-secret-key-2024-must-be-at-least-256-bits}
  access-token-expiration: 900000      # 15分钟
  refresh-token-expiration: 604800000  # 7天

# 日志级别
logging:
  level:
    com.usedcar: debug
    org.springframework.security: debug
